function registerWord(sceneKey,mesh,width){

    const left = mesh.position.x - width/2;
    const right = mesh.position.x + width/2;

    const anchor = sceneAnchors[sceneKey];

    anchor.min = Math.min(anchor.min,left);
    anchor.max = Math.max(anchor.max,right);
}

function computeSceneAnchor(sceneKey){

    const a = sceneAnchors[sceneKey];

    if(a.min === Infinity) return 0;

    return (a.min + a.max) / 2;
}


/* ========================================================= GLYPH ADVANCE ========================================================= */

function getAdvance(char,font,size){

    if(char===" "){
        const g = font.data.glyphs[" "] || font.data.glyphs["n"];
        return (g.ha*size)/font.data.resolution;
    }

    const glyph = font.data.glyphs[char] || font.data.glyphs["?"];

    return (glyph.ha*size)/font.data.resolution;
}


/* ========================================================= WORD CREATION ========================================================= */

function createWord(entry,font,layout,sceneOffset,sceneKey){

    const geo = new TextGeometry(entry.text,{
        font,
        size:CONFIG.size,
        height:CONFIG.depth,
        curveSegments:12,
        bevelEnabled:false
    });

    geo.computeBoundingBox();

    const box = geo.boundingBox;
    const width = box.max.x - box.min.x;

    geo.center();

    const material = new THREE.MeshStandardMaterial({
        color:0x00ff66,
        emissive:0x00ff66,
        emissiveIntensity:1.5,
        transparent:true,
        opacity:0
    });

    const mesh = new THREE.Mesh(geo,material);

    const line = entry.line || 1;
    const spacing = entry.spacing!==undefined ? entry.spacing : CONFIG.spacing;

    if(!layout[line])
        layout[line] = {cursorX:0,prevWidth:0,first:true};

    const lineState = layout[line];

    let x;

    if(lineState.first){
        x = 0;
        lineState.first = false;
    }
    else{
        const gap = (lineState.prevWidth/2)+(width/2)+spacing;
        lineState.cursorX += gap;
        x = lineState.cursorX;
    }

    mesh.position.x = x;
    mesh.position.y = entry.y!==undefined ? entry.y : -(line-1)*50;

    if(entry.z!==undefined)
        mesh.position.z = entry.z;

    mesh.position.add(sceneOffset);

    lineState.prevWidth = width;

    scene.add(mesh);

        // THE BONE-STITCH: CAPTURE THE TARGET FOR THE FUTURE FLY-IN
    entry.targetX = x;  
    entry.staticMesh = mesh; // THE "HANDLE" FOR THE RESURRECTION
    entry.targetY = mesh.position.y; // Capture the Y (Line height)



    words.push({mesh,material,time:entry.time});
    // IF IT IS A "DOP" or "BOP", BIRTH IT AS A "GHOST" (Invisible)
    if (entry.text.includes("dop!") || entry.text.includes("bop!")) {
        material.opacity = 0; 
    }
    if(line === 1)
        registerWord(sceneKey,mesh,width);
}


/* ========================================================= LETTER SEQUENCE ========================================================= */

function createLetterSequence(entry,font,layout,sceneOffset,sceneKey){

    const line = entry.line || 1;
    const spacing = entry.spacing!==undefined ? entry.spacing : CONFIG.spacing;

    if(!layout[line])
        layout[line] = {cursorX:0,prevWidth:0,first:true};

    const lineState = layout[line];

    let width = 0;

    for(let i=0;i<entry.text.length;i++){

        const char = entry.text[i];

        width += getAdvance(char,font,CONFIG.size);

        if(i<entry.text.length-1)
            width += CONFIG.letterSpacing;
    }

    let centerX;

    if(lineState.first){
        centerX = 0;
        lineState.first = false;
    }
    else{
        const gap = (lineState.prevWidth/2)+(width/2)+spacing;
        lineState.cursorX += gap;
        centerX = lineState.cursorX;
    }

    let cursor = centerX - width/2;

    for(let i=0;i<entry.text.length;i++){

        const char = entry.text[i];

        const geometry = new TextGeometry(char,{
            font,
            size:CONFIG.size,
            height:CONFIG.depth,
            curveSegments:12,
            bevelEnabled:false
        });

        const material = new THREE.MeshStandardMaterial({
            color:0x00ff66,
            emissive:0x00ff66,
            emissiveIntensity:1.5,
            transparent:true,
            opacity:0
        });

        const mesh = new THREE.Mesh(geometry,material);

        mesh.position.x = cursor;
        mesh.position.y = entry.y!==undefined ? entry.y : -(line-1)*50;

        if(entry.z!==undefined)
            mesh.position.z = entry.z;

        mesh.position.add(sceneOffset);

        scene.add(mesh);

        letters.push({
            mesh,
            material,
            time:entry.time + i*0.035
        });

        cursor += getAdvance(char,font,CONFIG.size)+CONFIG.letterSpacing;
    }

    lineState.prevWidth = width;

    if(line === 1)
        registerWord(sceneKey,{position:{x:centerX}},width);
}
